<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tails-logo.png?v=3" />
    <link rel="shortcut icon" type="image/png" href="/tails-logo.png?v=3" />
    <link rel="apple-touch-icon" href="/tails-logo.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Tails — Internal Tools</title>
    <script>
      (function () {
        try {
          var k = 'tails-ui-theme'
          var t = localStorage.getItem(k)
          var dark
          if (t === 'dark') dark = true
          else if (t === 'light') dark = false
          else dark = window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.classList.toggle('dark', dark)
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
